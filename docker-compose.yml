version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: autoprep
      POSTGRES_USER: autoprep
      POSTGRES_PASSWORD: autoprep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://autoprep:autoprep@postgres:5432/autoprep
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
